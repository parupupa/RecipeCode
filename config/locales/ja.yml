ja:
  time:
    formats:
      default: "%Y/%m/%d %H:%M"
      short: "%Y/%m/%d"
      long: "%Y年%m月%d日 %H時%M分"

  date:
    formats:
      default: "%Y/%m/%d"
      short: "%m/%d"
      long: "%Y年%m月%d日"

  errors:
